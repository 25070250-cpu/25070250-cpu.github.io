<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>multiple-classes.html</title>
    <style>
        body {
            font-family: "Times New Roman", Times, serif;
            font-size: 22px;
        }
        .apple { color: red }
        .orange { color: orange }
        .small { font-size: 16px }

         font-style: italic;

</head>    
    <body>
      multiple classes
      <h2 class="apple orange small">Apple + Orange</h2>
      <h2 class="apple">Apple</h2>
      <h2 class="orange">Orange</h2>

    </body>    
</html>
