<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Multiplication Table</title>
    <style>
        table { border-collapse: collapse; text-align: center; }
        td, th { border: 1px solid black; padding: 8px; width: 30px; }
    </style>
</head>
<body>
    <h2>Multiplication Table (1-10)</h2>
    <div id="table-container"></div>

    <script>
        window.onload = function() {
            let html = "<table>";
            for (let i = 1; i <= 10; i++) {
                html += "<tr>";
                for (let j = 1; j <= 10; j++) {
                    html += `<td>${i * j}</td>`;
                }
                html += "</tr>";
            }
            html += "</table>";
            document.getElementById('table-container').innerHTML = html;
        };
    </script>
</body>
</html>
